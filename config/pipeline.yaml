# Patent pipeline configuration.
# Paths are relative to the project root.

paths:
  raw_dir: data/raw
  sample_dir: data/sample
  clean_dir: data/clean
  warehouse_dir: data/warehouse
  warehouse_db: data/warehouse/patents.duckdb
  sql_dir: sql
  queries_dir: sql/queries
  schema_file: sql/schema.sql
  reports_dir: reports
  figures_dir: reports/figures

ingest:
  # When true (default), `ingest` copies data/sample/* into data/raw/.
  # Set false and pass `--url` on CLI to download real USPTO data.
  use_sample: true
  sources:
    # PatentsView 2025 disambiguated bulk files. The modern schema collapses
    # the old (g_patent_inventor + g_inventor_disambiguated) pair into a
    # single per-(patent, inventor) link table, so we only need 5 files.
    # Total compressed ≈ 1.79 GB; uncompressed ≈ 15-25 GB.
    patent_tsv: "https://s3.amazonaws.com/data.patentsview.org/download/g_patent.tsv.zip"
    inventor_tsv: "https://s3.amazonaws.com/data.patentsview.org/download/g_inventor_disambiguated.tsv.zip"
    assignee_tsv: "https://s3.amazonaws.com/data.patentsview.org/download/g_assignee_disambiguated.tsv.zip"
    location_tsv: "https://s3.amazonaws.com/data.patentsview.org/download/g_location_disambiguated.tsv.zip"
    cpc_tsv: "https://s3.amazonaws.com/data.patentsview.org/download/g_cpc_current.tsv.zip"

clean:
  # Sample covers 2010-2025; allow the full real-USPTO range so the cleaner
  # passes everything in the sample window without filtering it out.
  min_year: 1976
  max_year: 2025
  # Drop rows where primary key is null; strip/normalise inventor & company names.
  dedupe: true

reports:
  top_n_inventors: 20
  top_n_companies: 20
  top_n_countries: 15
